<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0"><meta name="robots" content="noindex,nofollow">
<title>Amphitrite — Maritime Signal Digest</title><style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#185FA5;--green:#0e9f6e;--ink:#0f2233;--muted:#6b7c8c;--line:#e7eef0;--bg:#f6faf9}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.55;-webkit-font-smoothing:antialiased}
.serif{font-family:Georgia,'Times New Roman',serif}
.wrap{max-width:880px;margin:0 auto;padding:0 20px 80px}
nav.bar{position:sticky;top:0;z-index:30;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);display:flex;gap:6px;flex-wrap:wrap;padding:12px 20px;margin:0 -20px 0}
nav.bar a{font-size:13px;font-weight:600;color:var(--muted);text-decoration:none;padding:6px 13px;border-radius:20px;cursor:pointer;transition:.15s}
nav.bar a:hover{color:var(--blue);background:#eef5fb}
nav.bar a.on{color:#fff;background:linear-gradient(120deg,var(--blue),var(--green))}
.hero{padding:46px 0 26px;border-bottom:1px solid var(--line)}
.kicker{font-size:12px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--green)}
.hero h1{font-size:34px;font-weight:600;line-height:1.18;margin:8px 0 6px;color:var(--ink)}
.hero .meta{font-size:13px;color:var(--muted)}
details.fold{margin:20px 0 6px;border:1px solid var(--line);border-radius:16px;background:#fff;box-shadow:0 6px 24px rgba(13,40,60,.05)}
details.fold>summary{cursor:pointer;list-style:none;padding:16px 22px;font-weight:700;color:var(--ink);font-size:15px;display:flex;justify-content:space-between;align-items:center}
details.fold>summary::-webkit-details-marker{display:none}
details.fold>summary::after{content:'▾';color:var(--muted);font-size:12px}
details.fold[open]>summary::after{content:'▴'}
.fold .body{padding:2px 22px 20px;font-size:14.5px;color:#33485a}
.fold .body h2{font-family:Georgia,serif;font-size:15px;color:var(--blue);margin:14px 0 4px;font-weight:700}
.fold .body p{margin:7px 0}
.fold .body ul{margin:7px 0 7px 20px}
.area{margin:40px 0 0;scroll-margin-top:70px}
.area-head{display:flex;align-items:baseline;gap:12px;border-bottom:2px solid var(--ink);padding-bottom:8px}
.area-head h2{font-family:Georgia,serif;font-size:25px;font-weight:600}
.area-head .count{font-size:13px;color:var(--muted);font-weight:600}
.area-breakdown{font-size:14.5px;color:#3a5161;background:linear-gradient(120deg,#f2faf7,#eef5fb);border-left:3px solid var(--green);border-radius:0 12px 12px 0;padding:13px 18px;margin:14px 0 18px}
.sublabel{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin:24px 0 10px}
details.lead{background:#fff;border:1px solid var(--line);border-radius:14px;margin-bottom:10px;box-shadow:0 2px 10px rgba(13,40,60,.04);overflow:hidden;transition:.15s}
details.lead:hover{box-shadow:0 6px 22px rgba(13,40,60,.09)}
details.lead>summary{cursor:pointer;list-style:none;display:flex;align-items:center;gap:11px;padding:14px 18px}
details.lead>summary::-webkit-details-marker{display:none}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.s-co{font-weight:700;font-size:15.5px;color:var(--ink)}
.s-date{font-size:12.5px;color:var(--muted);font-weight:600;white-space:nowrap}
.s-hook{font-size:13.5px;color:#52677a;flex:1;min-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fit{font-size:10.5px;font-weight:800;letter-spacing:.02em;padding:3px 9px;border-radius:20px;background:#d9f5e8;color:#067a52;white-space:nowrap}
.fit.theory{background:#fdf3d3;color:#946a08}.fit.integ{background:#e2edfb;color:#1d5fa6}
.pill{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap}
.pill.seen{background:#f3e8ff;color:#7c3aed}.pill.warm{background:#fff3d6;color:#9a6b00}
.lead-body{padding:2px 18px 16px;border-top:1px solid var(--line);font-size:13.5px;color:#3a5161}
.lead-body .ln{margin:9px 0}
.lead-body b{color:var(--ink)}
.angle{background:#eef5fb;border-radius:10px;padding:11px 14px;color:#0c447c;margin:10px 0;font-size:13.5px}
.foot{font-size:12px;color:#90a2b1;margin-top:6px}
.foot a{color:var(--blue);text-decoration:none}
.cb{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;color:var(--muted);cursor:pointer;margin-top:12px;user-select:none;font-weight:600}
.cb input{width:16px;height:16px;cursor:pointer;accent-color:var(--green)}
.news{border:1px solid var(--line);border-radius:14px;background:#fff;overflow:hidden}
.news>li,.news .it{list-style:none;padding:11px 16px;border-top:1px solid #f1f6f7;font-size:13.5px;color:#445a6b}
.news .it:first-child{border-top:none}
.news a{color:var(--blue);text-decoration:none;font-weight:600}
.news details>summary{cursor:pointer;list-style:none;padding:11px 16px;font-weight:700;color:var(--muted);font-size:13px;border-top:1px solid #f1f6f7}
.ev{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px 16px;margin-bottom:8px}
.ev .d{font-size:12px;font-weight:800;color:var(--green);width:74px;flex-shrink:0}
.ev .n{font-weight:700;font-size:14px;flex:1}.ev .n span{font-weight:400;color:var(--muted);font-size:12.5px}
.ev a{font-size:12.5px;color:var(--blue);text-decoration:none;font-weight:700}
.comp{background:linear-gradient(120deg,#fff,#fbf7ff);border:1px solid #ecdcff;border-left:4px solid #7c3aed;border-radius:14px;padding:14px 18px;margin-bottom:10px}
.comp .h{font-weight:700;color:#5b21b6}
.comp .a{font-size:13px;color:#3a5161;margin-top:5px}
.done-wrap{margin-top:46px;border-top:2px dashed var(--line);padding-top:18px}
.lead.done{opacity:.6}
.empty{color:#90a2b1;font-style:italic;padding:10px 0;font-size:13.5px}
.idx li{list-style:none;padding:13px 2px;border-bottom:1px solid var(--line);font-size:15px}
.idx a{color:var(--blue);text-decoration:none;font-weight:700}.idx .sub{color:var(--muted);font-size:13px;font-weight:400}
</style></head>
