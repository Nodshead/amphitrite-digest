<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0"><meta name="robots" content="noindex,nofollow">
<title>Amphitrite — Maritime Signal Digest</title><style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#16242e;--paper:#f7f4ee;--card:#fffdf9;--line:#e7e0d2;--muted:#857d6e;--accent:#0a6b5d;--gold:#b08d3f;--soft:#f1ece1}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:var(--paper);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased}
.serif{font-family:'Georgia','Times New Roman',serif;letter-spacing:-.01em}
.wrap{max-width:840px;margin:0 auto;padding:0 22px 90px}
nav.bar{position:sticky;top:0;z-index:30;background:rgba(247,244,238,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);display:flex;gap:20px;flex-wrap:wrap;padding:14px 22px;margin:0 -22px}
nav.bar a{font-size:12.5px;font-weight:600;letter-spacing:.02em;color:var(--muted);text-decoration:none;cursor:pointer;padding:4px 0;border-bottom:2px solid transparent;transition:.18s}
nav.bar a:hover{color:var(--ink)}
nav.bar a.on{color:var(--ink);border-bottom-color:var(--gold)}
.hero{padding:54px 0 30px;border-bottom:1px solid var(--line)}
.kicker{font-size:11px;font-weight:700;letter-spacing:.24em;text-transform:uppercase;color:var(--gold)}
.hero h1{font-size:38px;font-weight:500;line-height:1.16;margin:12px 0 10px;color:var(--ink)}
.hero .meta{font-size:13px;color:var(--muted);letter-spacing:.01em}
details.fold{margin:22px 0 8px;border:1px solid var(--line);border-radius:14px;background:var(--card)}
details.fold>summary{cursor:pointer;list-style:none;padding:17px 24px;font-weight:600;color:var(--ink);font-size:14.5px;letter-spacing:.02em;display:flex;justify-content:space-between;align-items:center}
details.fold>summary::-webkit-details-marker{display:none}
details.fold>summary::after{content:'＋';color:var(--gold);font-size:15px}
details.fold[open]>summary::after{content:'－'}
.fold .body{padding:0 24px 22px;font-size:14.5px;color:#3b4954}
.fold .body h2{font-family:Georgia,serif;font-size:14px;color:var(--accent);margin:15px 0 4px;font-weight:700;letter-spacing:.01em}
.fold .body p{margin:8px 0}.fold .body ul{margin:8px 0 8px 20px}
.area{margin:46px 0 0;scroll-margin-top:72px}
.area-head{display:flex;align-items:baseline;gap:13px;border-bottom:1px solid var(--ink);padding-bottom:10px}
.area-head h2{font-family:Georgia,serif;font-size:27px;font-weight:500}
.area-head .count{font-size:12px;color:var(--muted);font-weight:600;letter-spacing:.04em;text-transform:uppercase}
.area-breakdown{font-size:14px;color:#42505a;background:var(--soft);border-left:2px solid var(--gold);border-radius:0 10px 10px 0;padding:13px 18px;margin:16px 0 20px;font-style:italic}
.sublabel{font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin:26px 0 11px}
.legend{font-size:12px;color:var(--muted);margin:14px 0 0;display:flex;gap:14px;flex-wrap:wrap;align-items:center}
.lead{background:var(--card);border:1px solid var(--line);border-radius:12px;margin-bottom:12px;padding:16px 19px;transition:.18s}
.lead:hover{border-color:#d7cdb8;box-shadow:0 8px 26px rgba(22,36,46,.06)}
.ltop{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:9px}
.utag{font-size:9.5px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;padding:3px 9px;border-radius:5px;flex-shrink:0}
.utag.high{background:#f1d9d2;color:#9b3024}.utag.med,.utag.medium{background:#f2e8cf;color:#876618}.utag.low{background:#e7e8e3;color:#6f7680}
.s-co{font-weight:700;font-size:16px;color:var(--ink)}
.s-date{font-size:12px;color:var(--muted);font-weight:600;white-space:nowrap;font-variant:tabular-nums;margin-left:auto}
.fit{font-size:10px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;padding:3px 9px;border-radius:5px;white-space:nowrap;background:#dbeae3;color:#0a6b5d}
.fit.theory{background:#f2e8cf;color:#876618}.fit.integ{background:#e3e8ee;color:#2c4a63}
.pill{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap}
.pill.seen{background:#ece6f5;color:#6b4ea3}.pill.warm{background:#f6ecd5;color:#94701a}
.lwhat{font-size:15px;color:var(--ink);line-height:1.5;margin:2px 0 6px;font-weight:600}
.lwhy{font-size:13px;color:#56636e;margin:5px 0}.lwhy b{color:var(--ink)}
.angle{background:#eef2f0;border:1px solid #e0e8e4;border-radius:9px;padding:11px 14px;color:#0a4a40;margin:11px 0;font-size:13.5px}
.foot{font-size:11.5px;color:#9aa1a8;margin-top:7px}.foot a{color:var(--accent);text-decoration:none;font-weight:600}
.cb{display:inline-flex;align-items:center;gap:7px;font-size:12px;color:var(--muted);cursor:pointer;margin-top:12px;user-select:none;font-weight:600}
.cb input{width:15px;height:15px;cursor:pointer;accent-color:var(--accent)}
.news{border:1px solid var(--line);border-radius:12px;background:var(--card);overflow:hidden}
.news .it{padding:11px 16px;border-top:1px solid var(--soft);font-size:13px;color:#4a5763}.news .it:first-child{border-top:none}
.news a{color:var(--accent);text-decoration:none;font-weight:600}
.news details>summary{cursor:pointer;list-style:none;padding:11px 16px;font-weight:700;color:var(--muted);font-size:12.5px;border-top:1px solid var(--soft)}
.ev{display:flex;align-items:center;gap:13px;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:12px 16px;margin-bottom:8px}
.ev .d{font-size:11.5px;font-weight:800;color:var(--accent);width:78px;flex-shrink:0;letter-spacing:.02em}
.ev .n{font-weight:700;font-size:13.5px;flex:1}.ev .n span{font-weight:400;color:var(--muted);font-size:12px}
.ev a{font-size:12px;color:var(--gold);text-decoration:none;font-weight:700;white-space:nowrap}
.comp{background:var(--card);border:1px solid var(--line);border-left:3px solid var(--gold);border-radius:12px;padding:15px 18px;margin-bottom:9px}
.comp .h{font-weight:700;color:var(--ink);font-family:Georgia,serif}
.comp .a{font-size:13px;color:#42505a;margin-top:6px}
.done-wrap{margin-top:50px;border-top:1px dashed var(--line);padding-top:20px}
.lead.done{opacity:.55}
.empty{color:#9aa1a8;font-style:italic;padding:10px 0;font-size:13px}
.idx li{list-style:none;padding:14px 2px;border-bottom:1px solid var(--line);font-size:15px}
.idx a{color:var(--ink);text-decoration:none;font-weight:700;font-family:Georgia,serif}.idx .sub{color:var(--muted);font-size:12.5px;font-weight:400}
</style></head>
